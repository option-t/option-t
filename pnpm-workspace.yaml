packages:
  - packages/*

catalog:
  '@eslint/js': ^10.0.1
  '@reflink/reflink': ^0.1.19
  '@typescript-eslint/eslint-plugin': ^8.59.4
  '@typescript-eslint/parser': ^8.59.4
  ava: ^8.0.1
  del-cli: ^7.0.0
  eslint: ^10.2.1
  eslint-config-prettier: ^10.1.8
  eslint-config-turbo: ^2.9.14
  eslint-import-resolver-typescript: ^4.4.5
  eslint-plugin-import-x: ^4.16.2
  expect-type: ^1.3.0
  globals: ^17.6.0
  picomatch: ^4.0.4
  prettier: ^3.8.3
  turbo: ^2.9.14
  typescript: ^6.0.3

catalogs:
  # Workaround some packages' `peerDependencies` which specify `typescript` to `*` but they only work with `^6`.
  typescript6:
    typescript: npm:@typescript/typescript6@^6.0.0

minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  # We trust Microsoft's release engineering...
  - typescript

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 60 * 24 * 30 min

# Mitigate an attack vector for a typical supply chain attack.
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  unrs-resolver: false
