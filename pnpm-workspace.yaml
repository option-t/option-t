packages:
  - packages/*

catalog:
  '@eslint/js': ^10.0.1
  '@reflink/reflink': ^0.1.19
  '@typescript-eslint/eslint-plugin': ^8.61.0
  '@typescript-eslint/parser': ^8.62.0
  '@typescript/typescript6': ^6.0.1
  ava: ^8.0.1
  del-cli: ^7.0.0
  eslint: ^10.5.0
  eslint-config-prettier: ^10.1.8
  eslint-config-turbo: ^2.9.18
  eslint-import-resolver-typescript: ^4.4.5
  eslint-plugin-import-x: ^4.16.2
  expect-type: ^1.3.0
  globals: ^17.7.0
  picomatch: ^4.0.4
  prettier: ^3.8.4
  turbo: ^2.9.18
  typescript: 7.0.1-rc

catalogs:
  # Workaround some packages' `peerDependencies` which specify `typescript` to `*` but they only work with `^6`.
  typescript6:
    typescript: npm:@typescript/typescript6@^6.0.1

strictPeerDependencies: true # Detect peerDependencies corretness

minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  # We trust Microsoft's release engineering...
  - typescript
  - '@typescript/typescript-*'

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 60 * 24 * 30 min

# Mitigate an attack vector for a typical supply chain attack.
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  unrs-resolver: false
